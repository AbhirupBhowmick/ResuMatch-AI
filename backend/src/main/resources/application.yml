spring:
  application:
    name: resumatch-ai

  # Database Configuration (Neon/PostgreSQL)
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # File Upload Settings
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Security & OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            # Explicit absolute HTTPS URL to prevent mismatches on Railway
            redirect-uri: "https://resumatch-ai-production.up.railway.app/login/oauth2/code/google"
            scope:
              - email
              - profile

# JWT Authentication
jwt:
  secret: ${JWT_SECRET}
  expirationMs: 86400000 # 24 hours

# Payment Integration
razorpay:
  keyId: ${RAZORPAY_KEY_ID}
  keySecret: ${RAZORPAY_KEY_SECRET}
  webhookSecret: ${RAZORPAY_WEBHOOK_SECRET}

# AI Integration
gemini:
  api:
    key: ${GEMINI_API_KEY}

# Server & Proxy Configuration
server:
  # Uses Railway's dynamic port, defaults to 8080
  port: ${PORT:8080}
  # CRITICAL: Tells Spring to trust 'X-Forwarded-Proto' headers from Railway's proxy
  # This fixes the 'http' vs 'https' redirect mismatch in Google OAuth
  forward-headers-strategy: framework
  error:
    include-message: always
